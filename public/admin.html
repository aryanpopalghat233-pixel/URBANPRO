<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-container">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>URBANSERVICE</h2>
<ul>
<li onclick="showSection('dashboard')">Dashboard</li>
<li onclick="showSection('bookings')">Bookings</li>
<li onclick="showSection('workers')">Workers</li>
</ul>
</div>

<!-- MAIN -->
<div class="main">

<!-- LOGIN -->
<div id="loginBox" class="login-box">
<h2>Admin Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="content hidden">
<h2>Dashboard</h2>

<div class="stats">
<div class="stat-card">
<h3 id="totalBookings">0</h3>
<p>Bookings</p>
</div>

<div class="stat-card">
<h3 id="totalWorkers">0</h3>
<p>Workers</p>
</div>
</div>
</div>

<!-- BOOKINGS -->
<div id="bookings" class="content hidden">
<h2>Bookings</h2>
<table>
<thead>
<tr>
<th>Name</th>
<th>Service</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead>
<tbody id="bookingTable"></tbody>
</table>
</div>

<!-- WORKERS -->
<div id="workers" class="content hidden">
<h2>Workers</h2>
<table>
<thead>
<tr>
<th>Name</th>
<th>Skill</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead>
<tbody id="workerTable"></tbody>
</table>
</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
