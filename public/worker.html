<!DOCTYPE html>
<html>
<head>
<title>Apply as Worker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
<h1>URBANSERVICE</h1>
</nav>

<div class="form-container">
<h2>Become a Worker</h2>

<form id="workerForm">
<input placeholder="Full Name" id="wname" required>
<input placeholder="Phone" id="wphone" required>
<input placeholder="Skills (e.g Plumbing)" id="skills" required>
<input placeholder="Experience (years)" id="experience">

<input placeholder="Latitude (e.g 18.52)" id="lat" required>
<input placeholder="Longitude (e.g 73.85)" id="lng" required>

<button>Apply</button>
</form>

</div>

<script src="script.js"></script>

</body>
</html>
