<!DOCTYPE html>
<html>
<head>
<title>URBANSERVICE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="uc-navbar">
<div class="left">
<div class="logo-box">UC</div>
<h2>UrbanService</h2>
</div>

<div class="center">
<a href="#">Revamp</a>
<a href="#">Native</a>
<a href="#">Beauty</a>
</div>

<div class="right">
<span class="location">📍 Mumbai</span>
<button class="login-btn">Login</button>
</div>
</nav>

<!-- HERO -->
<section class="uc-hero">

<h1>Home services at your doorstep</h1>

<div class="hero-container">

<!-- LEFT SIDE -->
<div class="left-box">

<!-- SEARCH -->
<div class="search-bar">
<input id="searchInput" placeholder="Search for services...">
<div id="suggestions"></div>
</div>

<!-- CATEGORY GRID -->
<div class="uc-grid">

<div class="uc-card" onclick="goService('Cleaning')">🧹 Cleaning</div>
<div class="uc-card" onclick="goService('Beauty')">💄 Beauty</div>
<div class="uc-card" onclick="goService('Plumbing')">🔧 Plumbing</div>
<div class="uc-card" onclick="goService('Electrician')">💡 Electrician</div>
<div class="uc-card" onclick="goService('AC Repair')">❄️ AC Repair</div>

</div>

</div>

<!-- RIGHT SIDE (BANNER + SUMMARY) -->
<div class="right-box">

<div class="banner">
<img id="bannerImg" src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
</div>

<div class="summary">
<h3>Your Bookings</h3>
<p>No services booked yet</p>
</div>

</div>

</div>

</section>

<script src="script.js"></script>
</body>
</html>
